<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#07071A"/>
      <stop offset="100%" stop-color="#0D0D2B"/>
    </linearGradient>
    <filter id="gN" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gT" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background card -->
  <rect x="0" y="0" width="760" height="200" rx="18" fill="url(#bg)"/>

  <!-- Top tricolor bar -->
  <rect x="18"  y="0" width="238" height="6" rx="3" fill="#FF9933"/>
  <rect x="261" y="0" width="238" height="6"         fill="#EEEEEE" opacity="0.45"/>
  <rect x="504" y="0" width="238" height="6" rx="3" fill="#138808"/>

  <!-- Bottom tricolor bar -->
  <rect x="18"  y="194" width="238" height="6" rx="3" fill="#FF9933"/>
  <rect x="261" y="194" width="238" height="6"         fill="#EEEEEE" opacity="0.45"/>
  <rect x="504" y="194" width="238" height="6" rx="3" fill="#138808"/>

  <!-- Left pulse bar -->
  <rect x="0" y="6" width="6" height="188" rx="3" fill="#FF9933">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Right pulse bar -->
  <rect x="754" y="6" width="6" height="188" rx="3" fill="#138808">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══════════ LEFT BLOCK (x=28 to x=370) ═══════════ -->

  <!-- Flag -->
  <text x="28" y="56" font-size="28" font-family="serif">&#127470;&#127475;</text>

  <!-- BUILT BY — all-caps label -->
  <text
    x="28" y="82"
    font-family="Georgia, serif"
    font-size="10.5"
    fill="#FF9933"
    letter-spacing="5.5"
    opacity="0.9">BUILT BY</text>

  <!-- NAME — 44px, anchored left at x=28 -->
  <text
    x="28" y="136"
    font-family="Georgia, serif"
    font-size="44" font-weight="900"
    fill="#FFFFFF"
    filter="url(#gN)">Darshan Paapani
    <animate attributeName="opacity" values="1;0.78;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Role line -->
  <text
    x="30" y="162"
    font-family="Georgia, serif"
    font-size="12" font-weight="400"
    fill="#FF9933"
    letter-spacing="2.5"
    opacity="0.75">Creator · Architect · Builder of JNANA</text>


  <!-- ═══════════ DIVIDER ═══════════ -->
  <line x1="395" y1="24" x2="395" y2="176"
    stroke="#FF9933" stroke-width="0.8" opacity="0.18"/>


  <!-- ═══════════ RIGHT BLOCK (x=415 to x=732) ═══════════ -->

  <!-- THE SPIRIT label -->
  <text
    x="415" y="52"
    font-family="Georgia, serif"
    font-size="10.5"
    fill="#138808"
    letter-spacing="5.5"
    opacity="0.9">THE SPIRIT</text>

  <!-- Quote line 1 -->
  <text
    x="415" y="88"
    font-family="Georgia, serif"
    font-size="19" font-weight="700"
    fill="#FFFFFF"
    opacity="0.9">"I didn't build a product.</text>

  <!-- Quote line 2 — glowing saffron, breathing -->
  <text
    x="415" y="118"
    font-family="Georgia, serif"
    font-size="19" font-weight="900"
    fill="#FF9933"
    filter="url(#gT)">I built a right for 1.4 Billion."
    <animate attributeName="opacity" values="1;0.45;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Devanagari -->
  <text
    x="415" y="148"
    font-family="Georgia, serif"
    font-size="13.5"
    fill="#138808"
    letter-spacing="1.5"
    opacity="0.85">&#2319;&#2325; &#2360;&#2379;&#2330; &#2404; &#2319;&#2325; &#2350;&#2367;&#2358;&#2344; &#2404; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319;</text>

  <!-- Micro italic -->
  <text
    x="415" y="172"
    font-family="Georgia, serif"
    font-size="10.5" font-style="italic"
    fill="#FFFFFF"
    opacity="0.28">One Nation · One Platform · Infinite Knowledge</text>

</svg>