<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180">
  <defs>

    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060614"/>
      <stop offset="100%" stop-color="#0C0C28"/>
    </linearGradient>

    <!-- Tricolor gradient for the border sweep line -->
    <linearGradient id="tricolor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"    stop-color="#FF9933"/>
      <stop offset="33%"   stop-color="#FF9933"/>
      <stop offset="33%"   stop-color="#EEEEEE"/>
      <stop offset="66%"   stop-color="#EEEEEE"/>
      <stop offset="66%"   stop-color="#138808"/>
      <stop offset="100%"  stop-color="#138808"/>
    </linearGradient>

    <!-- Name glow -->
    <filter id="nameGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Tagline glow -->
    <filter id="tagGlow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for labels -->
    <filter id="softGlow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="720" height="180" rx="16" fill="url(#bgGrad)"/>

  <!-- ═══ TRICOLOR TOP BORDER ═══ -->
  <rect x="16"  y="0" width="219" height="5" rx="2.5" fill="#FF9933"/>
  <rect x="251" y="0" width="218" height="5"           fill="#EEEEEE" opacity="0.55"/>
  <rect x="485" y="0" width="219" height="5" rx="2.5" fill="#138808"/>

  <!-- ═══ TRICOLOR BOTTOM BORDER ═══ -->
  <rect x="16"  y="175" width="219" height="5" rx="2.5" fill="#FF9933"/>
  <rect x="251" y="175" width="218" height="5"           fill="#EEEEEE" opacity="0.55"/>
  <rect x="485" y="175" width="219" height="5" rx="2.5" fill="#138808"/>

  <!-- ═══ LEFT VERTICAL SAFFRON BAR ═══ -->
  <rect x="0" y="5" width="5" height="170" rx="2.5" fill="#FF9933" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ RIGHT VERTICAL GREEN BAR ═══ -->
  <rect x="715" y="5" width="5" height="170" rx="2.5" fill="#138808" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>


  <!-- ══════════════════════════════════════════════ -->
  <!-- LEFT BLOCK — x: 28 to 340, vertically centered -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Flag emoji -->
  <text x="28" y="54"
    font-family="serif" font-size="26" text-anchor="start">🇮🇳</text>

  <!-- BUILT BY label -->
  <text x="28" y="82"
    font-family="Georgia, serif" font-size="10"
    fill="#FF9933" letter-spacing="5"
    text-anchor="start" opacity="0.9">BUILT BY</text>

  <!-- NAME — hero element -->
  <text x="28" y="128"
    font-family="Georgia, serif" font-size="40" font-weight="900"
    fill="#FFFFFF" text-anchor="start"
    filter="url(#nameGlow)">Darshan Paapani
    <animate attributeName="opacity" values="1;0.8;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle under name -->
  <text x="30" y="152"
    font-family="Georgia, serif" font-size="11.5" font-weight="400"
    fill="#FF9933" letter-spacing="2"
    text-anchor="start" opacity="0.75">Creator · Architect · Builder of JNANA</text>


  <!-- ═══ VERTICAL DIVIDER ═══ -->
  <line x1="360" y1="22" x2="360" y2="158"
    stroke="#FF9933" stroke-width="0.8" opacity="0.2"/>


  <!-- ══════════════════════════════════════════════ -->
  <!-- RIGHT BLOCK — x: 378 to 706                  -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- SPIRIT label -->
  <text x="378" y="46"
    font-family="Georgia, serif" font-size="10"
    fill="#138808" letter-spacing="5"
    text-anchor="start" opacity="0.9">THE SPIRIT</text>

  <!-- Tagline line 1 -->
  <text x="378" y="78"
    font-family="Georgia, serif" font-size="18.5" font-weight="700"
    fill="#FFFFFF" text-anchor="start" opacity="0.93">"I didn't build a product.</text>

  <!-- Tagline line 2 — golden saffron glow -->
  <text x="378" y="106"
    font-family="Georgia, serif" font-size="18.5" font-weight="900"
    fill="#FF9933" text-anchor="start"
    filter="url(#tagGlow)">I built a right for 1.4 Billion."
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Devanagari -->
  <text x="378" y="134"
    font-family="Georgia, serif" font-size="13"
    fill="#138808" letter-spacing="1.5"
    text-anchor="start" opacity="0.85">एक सोच · एक मिशन · भारत के लिए</text>

  <!-- Bottom micro line -->
  <text x="378" y="157"
    font-family="Georgia, serif" font-size="10.5" font-style="italic"
    fill="#FFFFFF" letter-spacing="0.5"
    text-anchor="start" opacity="0.3">One Nation · One Platform · Infinite Knowledge</text>

</svg>